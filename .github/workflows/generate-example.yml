name: Generate example branch

# On every push to main, regenerate a full example metarepo (real BMAD install)
# and force-push it to the `example` branch so reviewers can browse a realistic
# setup. The example branch is disposable — each run replaces it with a single
# fresh commit reflecting the latest main.
#
# No infinite loop: this only triggers on pushes to `main`; it pushes to
# `example`, which can never retrigger this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # TEMPORARY: validate the workflow end-to-end on this PR. Remove this
  # `pull_request` trigger before merging — the example branch should only be
  # regenerated from main.
  pull_request:
    branches: [main]

# Don't let two main pushes race on the force-push.
concurrency:
  group: generate-example
  cancel-in-progress: true

permissions:
  contents: write   # force-push the example branch
  issues: write     # sync example stories to GitHub Issues (showcase)

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (source of setup.sh + seed)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate example metarepo
        env:
          BMAD_SETUP_NONINTERACTIVE: '1'
          BMAD_OUTPUT_FOLDER: features
          BMAD_DOCS_FOLDER: docs
          BMAD_SETUP_PROJECTS: 'alpha,beta'
          BMAD_SETUP_ISSUES_SYNC: 'y'
        run: |
          set -euxo pipefail
          GEN="$RUNNER_TEMP/example-metarepo"
          rm -rf "$GEN"
          # Runs the real `npx bmad-method install` (network, ~minutes).
          bash setup.sh "$GEN"
          # Overlay curated seed content over the scaffolded projects.
          for proj in alpha beta; do
            if [ -d "examples/seed/$proj" ]; then
              cp -R "examples/seed/$proj/." "$GEN/projects/$proj/"
            fi
          done

      - name: Run the example project's CI (pytest + shellcheck)
        env:
          GEN_DIR: ${{ runner.temp }}/example-metarepo
        run: |
          set -euxo pipefail
          cd "$GEN_DIR"
          # Exercise the CI the generated metarepo ships (.github/workflows/ci.yml):
          # run its test suite and lint its shell script. Gates publishing the
          # example on these passing.
          pip install pytest pyyaml
          python -m pytest tests/ -q
          shellcheck --severity=error scripts/bmad-router.sh

      - name: Sync example stories to GitHub Issues (showcase)
        env:
          GEN_DIR: ${{ runner.temp }}/example-metarepo
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          pip install pyyaml
          cd "$GEN_DIR"
          # alpha's github-sync.yaml targets this repo, so its ready stories become
          # real issues here. Idempotent (markers); writes issue numbers back into
          # sprint-status.yaml, which the next step commits to the example branch.
          python scripts/bmad-issues.py sync --project alpha

      - name: Force-push generated tree to example branch
        env:
          GEN_DIR: ${{ runner.temp }}/example-metarepo
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          cd "$GEN_DIR"
          # setup.sh runs `git init` in the target dir (no commits). Discard that
          # empty repo so we start a clean, single-commit history on `example`.
          rm -rf .git
          # The default GITHUB_TOKEN is forbidden (by GitHub design) from pushing
          # files under .github/workflows/. The generated metarepo ships a
          # sync-issues workflow there, so relocate any such files to a visible,
          # non-workflows path on the static example branch.
          if [ -d .github/workflows ] && [ -n "$(ls -A .github/workflows 2>/dev/null)" ]; then
            mkdir -p .github/example-workflows
            mv .github/workflows/* .github/example-workflows/
            rmdir .github/workflows
            printf '%s\n' \
              '# example-workflows/' \
              '' \
              'On a real metarepo these files live under `.github/workflows/`. They are' \
              'relocated here on the static example branch because the auto-publish job' \
              'pushes with the default GITHUB_TOKEN, which GitHub forbids from writing' \
              'workflow files. Copy them back to .github/workflows/ in your own metarepo.' \
              > .github/example-workflows/README.md
          fi
          # Standalone single-commit history: the example tree differs from main,
          # so a fresh init + force-push keeps `example` clean and conflict-free.
          git init -q -b example
          git config user.name "bmad-example[bot]"
          git config user.email "bmad-example[bot]@users.noreply.github.com"
          git add -A
          # repos/ and implementation/ are gitignored in a real metarepo; force-add
          # the placeholder READMEs so the structure is visible on the branch.
          git add --force projects/*/repos/ projects/*/implementation/ || true
          git commit -qm "chore: regenerate example metarepo from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin example

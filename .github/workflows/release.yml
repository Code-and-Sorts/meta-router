name: Release

# Cut a versioned release: create the git tag and a GitHub Release for it.
# The install.sh bootstrap resolves the newest Release (or a pinned tag), so a
# Release is what makes `curl … | bash` installs reproducible.
#
# Run from the Actions tab (workflow_dispatch) with a vX.Y.Z version. The tag is
# created at the commit the workflow runs against, so pick the right branch/SHA.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.1.0 (must be vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must look like v1.2.3 (got '$VERSION')"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "::error::tag $VERSION already exists"
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"

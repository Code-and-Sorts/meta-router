# meta-router override for the BMad `bmad-create-story` skill.
#
# Copied into _bmad/custom/bmad-create-story.toml by setup.sh. Sparse,
# committed (team-scope) override; arrays append to the skill defaults.
#
# Purpose: every story must declare which source repos it touches, so the
# dev-story workflow can create the right git worktrees. BMad has no native
# "affected repos" field, so we instruct the Scrum Master agent to add a
# structured '## Affected Repos' section to each story it writes.

[workflow]

activation_steps_append = [
  "Run `bash .claude/skills/meta-router/scripts/meta-router.sh repos` to list the active workspace's configured source repos so you know the available repo names.",
]

# The "file:" entry loads the metarepo's overall shared context — org-wide
# standards that apply to every workspace — so stories are written against them.
# Its path is tool-agnostic in the template; setup.sh resolves it to the
# configured agent tool's knowledge dir (.claude/, .github/, .codex/, .agents/).
persistent_facts = [
  "Every story file MUST include a '## Affected Repos' section listing, one per line as `- <repo-name>`, which of the workspace's source repos the story touches. A backend-only story lists one repo; a full-stack story lists several (e.g. web, gql-aggregator, api). Use the exact repo names shown by `bash .claude/skills/meta-router/scripts/meta-router.sh repos` — meta-router creates a git worktree per listed repo when the story is implemented.",
  "file:{project-root}/.claude/knowledge/shared-context.md",
]

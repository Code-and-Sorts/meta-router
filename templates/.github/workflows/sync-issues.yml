name: Sync BMad artifacts to GitHub Issues + Projects

# Single writer for issue state and board Status. Fires when BMad artifacts
# change, when a source repo pings us about a story PR (bmad-pr-ping.yml),
# and nightly as a reconcile sweep.
#
# Requires the BMAD_PROJECT_TOKEN secret: a fine-grained PAT (or GitHub App
# token) with Projects read/write on the org plus Issues read/write and
# Pull requests read on the metarepo and every project source repo. The
# default GITHUB_TOKEN cannot access Projects v2 — there is no fallback.

on:
  push:
    paths:
      - 'projects/**/planning-artifacts/**'
      - 'projects/**/implementation-artifacts/**'
      - 'projects/**/github-sync.yaml'

  # Sent by bmad-pr-ping.yml in source repos when a story/* PR opens/closes
  repository_dispatch:
    types: [bmad-pr]

  # Nightly reconcile: catches PR merges, manual issue edits, missed events
  schedule:
    - cron: '23 4 * * *'

  workflow_dispatch:
    inputs:
      project:
        description: 'Project to sync (blank = all configured)'
        required: false
        type: string

# Serialize runs so two pushes can't interleave issue creation
concurrency:
  group: bmad-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check token
        env:
          GH_TOKEN: ${{ secrets.BMAD_PROJECT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::BMAD_PROJECT_TOKEN secret is not set. Create a fine-grained PAT with org Projects read/write + Issues read/write and add it as a repo or org secret."
            exit 1
          fi

      - name: Detect changed projects
        id: detect
        env:
          INPUT_PROJECT: ${{ inputs.project }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ -n "$INPUT_PROJECT" ]; then
            echo "projects=$INPUT_PROJECT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && [ -n "$PUSH_BEFORE" ] && \
             ! echo "$PUSH_BEFORE" | grep -q '^0*$' && \
             git cat-file -e "$PUSH_BEFORE" 2>/dev/null; then
            # NF >= 3 keeps only projects/<name>/<file> paths, so files sitting
            # directly under projects/ are not mistaken for project names.
            CHANGED=$(git diff --name-only "$PUSH_BEFORE" "$PUSH_AFTER" -- 'projects/' \
              | awk -F/ 'NF >= 3 {print $2}' | sort -u | tr '\n' ' ')
            echo "projects=$CHANGED" >> "$GITHUB_OUTPUT"
          else
            # dispatch / schedule / first push on a branch → sync everything
            echo "projects=--all" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync
        if: steps.detect.outputs.projects != ''
        env:
          GH_TOKEN: ${{ secrets.BMAD_PROJECT_TOKEN }}
          PROJECTS: ${{ steps.detect.outputs.projects }}
        run: |
          if [ "$PROJECTS" = "--all" ]; then
            python scripts/bmad-issues.py sync --all
          else
            for project in $PROJECTS; do
              if [ -f "projects/$project/github-sync.yaml" ]; then
                python scripts/bmad-issues.py sync --project "$project"
              else
                echo "Skipping $project (no github-sync.yaml)"
              fi
            done
          fi

# bmad-router override for the BMAD `bmad-create-story` skill.
#
# Copied into _bmad/custom/bmad-create-story.toml by setup.sh. Sparse,
# committed (team-scope) override; arrays append to the skill defaults.
#
# Purpose: every story must declare which source repos it touches, so the
# dev-story workflow can create the right git worktrees. BMAD has no native
# "affected repos" field, so we instruct the Scrum Master agent to add a
# structured '## Affected Repos' section to each story it writes.

[workflow]

activation_steps_append = [
  "This project tracks its source repos in projects/<active>/repos.yaml (resolve <active> with `bash scripts/bmad-router.sh current`). Read it so you know the available repo names.",
]

persistent_facts = [
  "Every story file MUST include a '## Affected Repos' section listing, one per line as `- <repo-name>`, which of the project's repos.yaml repositories the story touches. A backend-only story lists one repo; a full-stack story lists several (e.g. web, gql-aggregator, api). Use the exact repo names from repos.yaml — bmad-router creates a git worktree per listed repo when the story is implemented.",
]

# bmad-router override for the BMAD `bmad-dev-story` skill.
#
# Copied into _bmad/custom/bmad-dev-story.toml by setup.sh. This is a sparse,
# committed (team-scope) override that merges over the skill's shipped
# customize.toml. Per BMAD merge rules, arrays here APPEND to the defaults and
# scalars override. Personal tweaks go in _bmad/custom/bmad-dev-story.user.toml
# (gitignored), which wins over this file.
#
# Purpose: before implementing a story, create an isolated git worktree for each
# source repo the story touches, so a full-stack story (web + aggregator + service)
# is developed across several repos without polluting a shared checkout.

[workflow]

# Pre-flight: derive the affected repos from the story and create worktrees.
activation_steps_prepend = [
  "Determine the active bmad-router project: run `bash scripts/bmad-router.sh current`. All paths below are under projects/<active>/.",
  "Read the story file's '## Affected Repos' section to get the list of source repos this story touches (names match entries in projects/<active>/repos.yaml). If the section is absent or empty, fall back to every repo in repos.yaml only when the project has exactly one repo; otherwise ask the user which repos the story touches.",
  "Ensure each affected repo is cloned: run `bash scripts/bmad-router.sh clone <repo>` for any that are not yet present under projects/<active>/repos/.",
  "Create the per-story worktrees: run `bash scripts/bmad-router.sh worktree <story-id> <repo> [<repo> ...]` with every affected repo. This creates projects/<active>/implementation/<story-id>/<repo>/ checked out on branch story/<story-id> for each repo.",
  "Implement ALL code changes for this story inside those worktrees (projects/<active>/implementation/<story-id>/<repo>/), never directly in projects/<active>/repos/<repo>/. Commit on the story/<story-id> branch in each affected repo.",
]

# Load the full worktree workflow as static context for the whole run.
persistent_facts = [
  "file:{project-root}/_bmad/custom/worktree-workflow.md",
]

# Post-completion: remind the user the worktrees persist for review/PR.
on_complete = "The per-story worktrees remain under projects/<active>/implementation/<story-id>/ for review and PR creation. After the story's branches are merged, remove them with `bash scripts/bmad-router.sh worktree-rm <story-id>`."
